<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 완료 — 플랜팡</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a; color: #f0f0f0;
  font-family: 'Pretendard', sans-serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  background: #161616;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 48px 40px;
  max-width: 480px;
  width: 100%;
  text-align: center;
}
.icon { font-size: 56px; margin-bottom: 24px; }
h1 { font-size: 26px; font-weight: 900; letter-spacing: -1px; margin-bottom: 12px; }
h1 span { color: #FFE034; }
p { color: #888; font-size: 15px; line-height: 1.7; margin-bottom: 32px; }
.info-box {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 32px;
  text-align: left;
  font-size: 14px;
  color: #888;
  line-height: 2;
}
.info-box strong { color: #f0f0f0; }
.btn {
  display: inline-block;
  background: #FFE034; color: #0a0a0a;
  border-radius: 50px; padding: 14px 32px;
  font-size: 15px; font-weight: 800;
  text-decoration: none;
  cursor: pointer;
}
.timer { font-size: 12px; color: #555; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>결제 완료!<br><span>일정 만드는 중</span>이에요</h1>
  <p>AI가 맞춤 여행 일정을 만들고 있어요.<br>보통 <strong style="color:#FFE034">2~3분</strong> 내로 이메일로 PDF가 도착해요!</p>
  <div class="info-box">
    📧 이메일 확인해주세요<br>
    📁 스팸함도 확인해보세요<br>
    💬 문의: 카카오톡 <strong>@플랜팡</strong>
  </div>
  <a href="/" class="btn">🏠 홈으로 돌아가기</a>
  <p class="timer">이 페이지는 자동으로 닫히지 않아요</p>
</div>
</body>
</html>
